          **Download TSCloud ${{ steps.version.outputs.version }} and take control of your cloud storage!**
          
          🔐 **Your files, your bot, your security.**
          EOF
          
      - name: Read release notes
        id: release_notes
        run: |
          if [ -f "RELEASE_NOTES_v${{ steps.version.outputs.version }}.md" ]; then
            echo "notes_file=RELEASE_NOTES_v${{ steps.version.outputs.version }}.md" >> $GITHUB_OUTPUT
          else
            echo "notes_file=CHANGELOG.md" >> $GITHUB_OUTPUT
          fi
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: TSCloud ${{ steps.version.outputs.version }} - Genesis
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload release summary
        run: |
          echo "## 🎉 TSCloud ${{ steps.version.outputs.version }} Released Successfully!"
          echo ""
          echo "### 📦 Release Assets Created:"
          ls -la release/ | grep -v "^total" | grep -v "^d" | awk '{print "- " $9 " (" $5 " bytes)"}'
          echo ""
          echo "### 🌍 Platforms Supported:"
          echo "- Windows (32-bit & 64-bit)"
          echo "- Linux (Ubuntu, Debian, Fedora, Arch)"
          echo "- Android (7.0+)"
          echo "- Web Dashboard"
          echo ""
          echo "### 🔗 Release URL:"
          echo "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"
          echo ""
          echo "### 📊 Total Release Size:"
          du -sh release/ | cut -f1
          echo ""
          echo "### 🚀 Next Steps:"
          echo "1. Test installations on clean systems"
          echo "2. Update documentation website"
          echo "3. Announce release to community"
          echo "4. Monitor for user feedback"